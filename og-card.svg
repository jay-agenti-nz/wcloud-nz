<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6e8f0"/>
      <stop offset="100%" stop-color="#eaf3f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fa8be"/>
      <stop offset="100%" stop-color="#4d6e80"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#2a3d4a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80"  r="220" fill="#7fa8be" opacity="0.08"/>
  <circle cx="80"   cy="560" r="160" fill="#7fa8be" opacity="0.07"/>
  <circle cx="600"  cy="630" r="200" fill="#4d6e80" opacity="0.05"/>

  <!-- Card — centred, standard biz card ratio, slight tilt -->
  <g transform="rotate(-3, 600, 315)" filter="url(#shadow)">
    <rect x="320" y="138" width="560" height="354" rx="22" fill="url(#card)"/>

    <!-- Decorative blobs on card -->
    <circle cx="820" cy="165" r="110" fill="white" opacity="0.05"/>
    <circle cx="340" cy="460" r="80"  fill="white" opacity="0.04"/>

    <!-- Wave logo -->
    <path d="M358 208 C376 186,394 228,412 206 C430 186,448 220,466 202" stroke="white" stroke-width="5"   stroke-linecap="round" fill="none"/>
    <path d="M358 220 C378 197,398 240,418 218 C438 198,456 228,474 212" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Wordmark -->
    <text x="488" y="210" font-family="Arial,sans-serif" font-weight="700" font-size="12" fill="white" letter-spacing="5">WHITE</text>
    <text x="488" y="226" font-family="Arial,sans-serif" font-weight="600" font-size="12" fill="white" opacity="0.55" letter-spacing="5">CLOUD</text>

    <!-- Name -->
    <text x="358" y="328" font-family="Georgia,serif" font-weight="700" font-size="52" fill="white">Jay Vera</text>

    <!-- Title -->
    <text x="360" y="378" font-family="Arial,sans-serif" font-weight="600" font-size="18" fill="white" opacity="0.78" letter-spacing="0.5">Web Design · Built for AI · Christchurch, NZ</text>

    <!-- URL bottom right -->
    <text x="862" y="465" font-family="Arial,sans-serif" font-weight="600" font-size="13" fill="white" opacity="0.45" text-anchor="end" letter-spacing="0.5">wcloud.nz</text>

    <!-- Tap hint -->
    <text x="862" y="446" font-family="Arial,sans-serif" font-weight="600" font-size="11" fill="white" opacity="0.35" text-anchor="end">Tap to flip ↻</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="600" font-family="Arial,sans-serif" font-weight="700" font-size="12" fill="#4d6e80" text-anchor="middle" letter-spacing="4" opacity="0.6">DIGITAL BUSINESS CARD · WCLOUD.NZ/CARD</text>
</svg>
