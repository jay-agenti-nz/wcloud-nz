<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d6e80"/>
      <stop offset="100%" stop-color="#7fa8be"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="120"  r="320" fill="white" opacity="0.05"/>
  <circle cx="100"  cy="1080" r="260" fill="white" opacity="0.04"/>
  <circle cx="600"  cy="600"  r="500" fill="white" opacity="0.02"/>
  <circle cx="200"  cy="200"  r="180" fill="white" opacity="0.03"/>

  <!-- Wave logo — centered -->
  <path d="M536 430 C558 404, 580 458, 602 432 C624 406, 646 456, 668 430" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M536 448 C560 421, 584 476, 608 450 C632 424, 652 462, 672 446" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- WHITE CLOUD wordmark -->
  <text x="600" y="502" font-family="Arial,sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="8" text-anchor="middle">WHITE CLOUD</text>

  <!-- Divider -->
  <rect x="480" y="540" width="240" height="1.5" fill="white" opacity="0.20"/>

  <!-- Name -->
  <text x="600" y="660" font-family="Georgia,serif" font-weight="700" font-size="96" fill="white" text-anchor="middle">Jay Vera</text>

  <!-- Title -->
  <text x="600" y="728" font-family="Arial,sans-serif" font-weight="500" font-size="26" fill="white" opacity="0.75" text-anchor="middle" letter-spacing="1">Web Design · Built for AI · Christchurch, NZ</text>

  <!-- URL -->
  <text x="600" y="820" font-family="Arial,sans-serif" font-weight="600" font-size="22" fill="white" opacity="0.45" text-anchor="middle" letter-spacing="2">wcloud.nz/card</text>
</svg>
