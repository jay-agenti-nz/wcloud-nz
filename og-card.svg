<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6e8f0"/>
      <stop offset="100%" stop-color="#eaf3f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7fa8be"/>
      <stop offset="100%" stop-color="#4d6e80"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#2a3d4a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="80"  r="220" fill="#7fa8be" opacity="0.08"/>
  <circle cx="80"   cy="560" r="160" fill="#7fa8be" opacity="0.07"/>
  <circle cx="600"  cy="630" r="200" fill="#4d6e80" opacity="0.05"/>

  <!-- Card — smaller, well-padded, centred -->
  <g transform="rotate(-2, 600, 315)" filter="url(#shadow)">
    <rect x="260" y="135" width="680" height="360" rx="24" fill="url(#card)"/>

    <!-- Decorative blobs on card -->
    <circle cx="880" cy="160" r="120" fill="white" opacity="0.05"/>
    <circle cx="275" cy="470" r="90"  fill="white" opacity="0.04"/>

    <!-- Wave logo -->
    <path d="M296 192 C314 172,332 210,350 190 C368 172,386 206,404 188" stroke="white" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M296 204 C316 183,336 222,356 202 C376 183,392 212,410 197" stroke="white" stroke-width="3"   stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Wordmark -->
    <text x="422" y="194" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="white" letter-spacing="4">WHITE</text>
    <text x="422" y="208" font-family="Arial,sans-serif" font-weight="600" font-size="11" fill="white" opacity="0.55" letter-spacing="4">CLOUD</text>

    <!-- Name -->
    <text x="296" y="320" font-family="Georgia,serif" font-weight="700" font-size="58" fill="white">Jay Vera</text>

    <!-- Title -->
    <text x="298" y="368" font-family="Arial,sans-serif" font-weight="600" font-size="17" fill="white" opacity="0.80">Web Design · Built for AI · Christchurch, NZ</text>

    <!-- URL bottom right -->
    <text x="920" y="472" font-family="Arial,sans-serif" font-weight="600" font-size="13" fill="white" opacity="0.40" text-anchor="end">wcloud.nz</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="606" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#4d6e80" text-anchor="middle" letter-spacing="4" opacity="0.55">DIGITAL BUSINESS CARD · WCLOUD.NZ/CARD</text>
</svg>
